services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      WEB_ADMIN_USER: admin
      WEB_ADMIN_PASS: admin
      WEB_AUTH_TOKEN: dev-admin-token
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
